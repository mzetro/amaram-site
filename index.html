<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Amaram Shop</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* стрічка */

.slider{
position:fixed;
top:0;
left:0;
width:300%;
height:100vh;
display:flex;
animation:slide 25s linear infinite;
}

.slider img{
width:100vw;
height:100vh;
object-fit:cover;
}

/* рух */

@keyframes slide{
0%{transform:translateX(0);}
100%{transform:translateX(-200vw);}
}

/* кнопка */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:15px;
color:white;
text-align:center;
}

.btn{
display:inline-block;
margin-top:15px;
padding:15px 30px;
background:#ff2a75;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
}

</style>
</head>

<body>

<div class="slider">

<img src="img/photo1.jpg">
<img src="img/photo2.jpg">
<img src="img/photo3.jpg">

</div>

<div class="center">

<h1>Amaram Shop</h1>

<a class="btn" href="https://www.instagram.com/amaram.shop/" target="_blank">
Instagram
</a>

</div>

</body>
</html>
