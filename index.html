<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Amaram Shop</title>
<style>
/* Основні стилі */
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111; /* чорний фон */
  color: #fff; /* білий текст */
  overflow: hidden;
  position: relative;
}

/* Центрований блок */
.center {
  text-align: center;
  background: rgba(255, 255, 255, 0.05); /* легка прозорість */
  padding: 50px 80px;
  border-radius: 20px;
  box-shadow: 0 0 50px rgba(255,255,255,0.1);
  transition: transform 0.5s ease;
  z-index: 2;
}

.center:hover {
  transform: scale(1.03);
}

/* Заголовок */
.center h1 {
  font-size: 3em;
  margin: 0;
  letter-spacing: 2px;
}

/* Кнопка Instagram */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 18px 40px;
  background: #fff;
  color: #111;
  text-decoration: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  position: relative;
  overflow: hidden;
  transition: 0.4s ease;
}

/* Ефект хвилі при наведенні */
.btn::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.5s ease, height 0.5s ease;
}

.btn:hover::before {
  width: 300%;
  height: 300%;
}

.btn:hover {
  color: #ff2a75;
  background: #fff;
  box-shadow: 0 0 20px #ff2a75;
}

/* Частинки прикрас */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
  opacity: 0.8;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) translateX(0);
    opacity: 0.8;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(-50vh) translateX(50px);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="center">
  <h1>Amaram Shop</h1>
  <a class="btn" href="https://www.instagram.com/amaram.shop/" target="_blank">
    Instagram
  </a>
</div>

<!-- Частинки -->
<script>
const particlesCount = 50; // Кількість частинок
for (let i = 0; i < particlesCount; i++) {
  const p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random() * window.innerWidth + 'px';
  p.style.top = Math.random() * window.innerHeight + 'px';
  p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
  p.style.animationDuration = (Math.random() * 5 + 3) + 's';
  p.style.opacity = Math.random() * 0.8 + 0.2;
  document.body.appendChild(p);
}
</script>

</body>
</html>
